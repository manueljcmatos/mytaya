name = "mytaya-predictions"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[triggers]
crons = ["0 6 * * *", "*/30 * * * *", "0 * * * *"]

[ai]
binding = "AI"

[vars]
SUPABASE_URL = ""

# Secrets (set via `wrangler secret put`):
# wrangler secret put SUPABASE_SERVICE_KEY
# wrangler secret put API_FOOTBALL_KEY
# Note: API_FOOTBALL_KEY (x-apisports-key) works for both API-Football and API-Basketball -- no new secret needed
# wrangler secret put TELEGRAM_BOT_TOKEN
# wrangler secret put TELEGRAM_CHANNEL_ID

[[r2_buckets]]
binding = "CARDS_BUCKET"
bucket_name = "mytaya-cards"
preview_bucket_name = "mytaya-cards-preview"
